<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>술술 안주 - AI 브랜드별 안주 추천</title>

<meta name="theme-color" content="#0f0d1a">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root{--bg:#0f0d1a;--card:#1c1830;--accent:#ff7a59;--accent2:#ffd166;--txt:#f5f3ff;--sub:#a99fc7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
body{background:radial-gradient(circle at 20% 0%,#2a1f45,#0f0d1a 60%);color:var(--txt);min-height:100vh;padding:20px;}
.wrap{max-width:680px;margin:0 auto; position: relative;}
header{text-align:center;padding:24px 0 12px;}
h1{font-size:30px;letter-spacing:-1px;}h1 span{color:var(--accent);}
.tag{color:var(--sub);margin-top:8px;font-size:14px;}
.badge{display:inline-block;margin-top:10px;background:#2c2548;color:var(--accent2);font-size:12px;padding:5px 12px;border-radius:20px;}
.drop{margin-top:20px;border:2px dashed #4a3f6e;border-radius:20px;padding:36px 20px;text-align:center;background:var(--card);cursor:pointer;transition:.2s;}
.drop:hover{border-color:var(--accent);background:#241f3d;}.drop.drag{border-color:var(--accent2);background:#2c2548;}
.drop .ico{font-size:46px;}.drop p{margin-top:10px;color:var(--sub);font-size:14px;}
#preview{display:none;margin-top:18px;text-align:center;}
#preview img{max-width:100%;max-height:260px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.status{display:none;margin-top:16px;text-align:center;color:var(--accent2);font-size:14px;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #4a3f6e;border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
.detect{display:none;margin-top:14px;background:#241f3d;border-radius:12px;padding:12px 16px;font-size:13px;color:var(--sub);text-align:center;}
.detect b{color:var(--accent2);}
.sel{display:none;margin-top:16px;}
.sel h3{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:500;text-align:center;}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.chip{background:var(--card);border:1px solid #3a3257;color:var(--txt);padding:9px 16px;border-radius:30px;cursor:pointer;font-size:14px;transition:.15s;}
.chip:hover{border-color:var(--accent);}.chip.on{background:var(--accent);border-color:var(--accent);color:#1a1320;font-weight:700;}
.result{margin-top:20px;display:none;}
.rhead{background:var(--card);border-radius:18px;padding:20px;border:1px solid #2e2748;animation:up .4s ease;}
.rhead h2{font-size:21px;display:flex;align-items:center;gap:8px;}
.rhead .desc{color:var(--sub);font-size:13px;margin-top:6px;line-height:1.5;}
@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.cat{margin-top:14px;background:var(--card);border-radius:18px;padding:16px 18px;border:1px solid #2e2748;animation:up .4s ease;}
.cat .ct{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--accent2);}
.menu{margin-top:12px;display:grid;gap:10px;}
.item{display:flex;gap:12px;align-items:flex-start;background:#241f3d;padding:12px;border-radius:12px;position:relative;} /* position 추가 */
.item .emo{font-size:25px;}.item .nm{font-weight:700;font-size:15px;display:flex;align-items:center;}
.item .rs{color:var(--accent2);font-size:12px;margin-top:2px;}
.item .why{color:var(--sub);font-size:12px;margin-top:3px;line-height:1.5;}

/* 유저 추가 안주 전용 스타일 */
.user-cat { border-color: var(--accent); background: rgba(255, 122, 89, 0.05); }
.user-cat .ct { color: var(--accent); }
.u-badge { font-size: 11px; background: rgba(255, 122, 89, 0.15); color: var(--accent); padding: 3px 8px; border-radius: 8px; margin-left: 8px; font-weight: normal; letter-spacing: -0.5px; }

/* 수정/삭제 버튼 추가 */
.action-btns { position:absolute; top:12px; right:12px; display:flex; gap:6px; }
.action-btns button { background:transparent; border:none; color:var(--sub); cursor:pointer; font-size:13px; transition:0.2s; }
.action-btns button:hover { color:var(--txt); transform:scale(1.1); }

footer{text-align:center;color:#5b5278;font-size:12px;margin:30px 0 10px;}

/* 사용자 추가 버튼 및 모달 스타일 */
.add-btn-wrap { text-align:center; margin-top:20px; animation:up .4s ease; }
.add-btn { background:transparent; border:2px dashed #4a3f6e; color:var(--txt); padding:12px 24px; border-radius:30px; cursor:pointer; font-size:14px; transition:0.2s; font-weight:600; width:100%; max-width:300px; }
.add-btn:hover { background:#241f3d; border-color:var(--accent2); color:var(--accent2); }

.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; justify-content:center; align-items:center; padding:20px; backdrop-filter:blur(4px); }
.modal { background:var(--card); width:100%; max-width:400px; padding:24px; border-radius:18px; border:1px solid #4a3f6e; box-shadow:0 10px 40px rgba(0,0,0,0.8); animation:up .3s ease; }
.modal h3 { color:var(--txt); margin-bottom:16px; font-size:18px; text-align:center; }
.m-input { width:100%; padding:12px; margin-bottom:12px; background:#241f3d; border:1px solid #3a3257; color:var(--txt); border-radius:10px; font-size:14px; outline:none; transition:0.2s; }
.m-input:focus { border-color:var(--accent); }
.m-btn-row { display:flex; gap:10px; margin-top:10px; }
.m-btn { flex:1; padding:12px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:14px; transition:0.2s; }
.btn-cancel { background:#3a3257; color:var(--sub); }
.btn-cancel:hover { background:#4a3f6e; color:var(--txt); }
.btn-submit { background:var(--accent); color:#1a1320; }
.btn-submit:hover { opacity:0.9; transform:translateY(-1px); }
/* 🌟 앱 설치 팝업 스타일 */
.install-popup {
  position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 400px; background: var(--card); border: 2px solid var(--accent);
  border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.8); transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 1000;
}
.install-popup.show { bottom: 20px; }
.ip-text { flex: 1; font-size: 14px; color: var(--txt); line-height: 1.4; word-break: keep-all; }
.ip-text b { color: var(--accent2); }
.ip-btn { background: var(--accent); color: #1a1320; border: none; padding: 10px 16px; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
.ip-btn:hover { transform: scale(1.05); }
.ip-close { background: transparent; color: var(--sub); border: none; font-size: 18px; cursor: pointer; padding: 4px; transition: 0.2s; }
.ip-close:hover { color: var(--txt); }
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>🍶 술<span>술</span> 안주</h1>

<div id="installPopup" class="install-popup">
  <div class="ip-text">📱 <b>술술 안주</b>를 홈 화면에 추가하고 앱처럼 편리하게 사용해보세요!</div>
  <button id="installBtn" class="ip-btn">설치하기</button>
  <button id="closeInstallBtn" class="ip-close">✕</button>
</div>

<div class="modal-overlay" id="addModal">

    <h3 id="modalTitle">💡 나만의 안주 추천하기</h3>
    <select id="m-cat" class="m-input">

      <option value="snack">🍪 과자</option>
      <option value="fruit">🍓 과일</option>
      <option value="light">🍿 가벼운 간식</option>
    </select>
    <input type="text" id="m-emo" class="m-input" placeholder="이모지 한 개 (예: 🍕)" maxlength="2">
    <input type="text" id="m-nm" class="m-input" placeholder="안주 이름 (예: 페퍼로니 피자)">
    <select id="m-rs" class="m-input">
      <option value="★★★★★">★★★★★ (인생 조합!)</option>
      <option value="★★★★☆">★★★★☆ (추천해요)</option>
      <option value="★★★☆☆">★★★☆☆ (무난해요)</option>
    </select>
    <input type="text" id="m-why" class="m-input" placeholder="추천하는 이유를 짧게 적어주세요">
    <input type="password" id="m-pwd" class="m-input" placeholder="비밀번호 4자리 (수정/삭제용)" maxlength="4">
    
    <div class="m-btn-row">
      <button class="m-btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="m-btn btn-submit" onclick="submitPairing()">추천하기</button>
    </div>
  </div>
</div>

</div>

if (database) {
  database.ref('userCats').on('value', (snapshot) => {
    const data = snapshot.val() || {};
    for(const type in DB) {
      for(const brand in DB[type].brands) {
        DB[type].brands[brand].userCats = (data[type] && data[type][brand]) ? data[type][brand] : [];
      }
    }
    // 현재 열려있는 탭이 있다면 화면 새로고침

  });

const order=["beer","soju","makgeolli","wine_red","wine_white","whisky","sake","champagne","highball"];
const MAP=[
 {kw:["beer glass","beer bottle","beer"],type:"beer"},
 {kw:["champagne","sparkling"],type:"champagne"},
 {kw:["white wine","chardonnay"],type:"wine_white"},
 {kw:["red wine","wine bottle","wine"],type:"wine_red"},
 {kw:["whiskey","whisky","scotch","cognac","brandy","bourbon"],type:"whisky"},
 {kw:["tequila"],type:"whisky"},
 {kw:["sake","rice wine"],type:"sake"},
 {kw:["cocktail shaker","cocktail","highball","tumbler"],type:"highball"},

 {kw:["goblet","glass","cup"],type:"soju"}
];

const drop=document.getElementById('drop'),file=document.getElementById('file');
drop.onclick=()=>file.click();
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag');});
drop.addEventListener('dragleave',e=>{e.preventDefault();drop.classList.remove('drag');});

function show(f){const r=new FileReader();r.onload=e=>{const img=document.getElementById('pimg');img.src=e.target.result;document.getElementById('preview').style.display='block';img.onload=()=>classify(img,f.name);};r.readAsDataURL(f);}

async function classify(img,fname){
 const det=document.getElementById('detect'),st=document.getElementById('status');
 det.style.display='none';document.getElementById('result').style.display='none';document.getElementById('brandSel').style.display='none';
 document.getElementById('typeSel').style.display='block';
 const n=(fname||'').toLowerCase();
 for(const k of order){if(n.includes(k)||n.includes(DB[k].name)){det.style.display='block';det.innerHTML=`📁 파일명 인식: <b>${DB[k].name}</b>`;pickType(k,false);return;}}
 if(!model){det.style.display='block';det.innerHTML='⚠️ AI 모델 준비 안됨. 종류를 직접 선택하세요.';return;}
 st.style.display='block';
 try{
  const preds=await model.classify(img,5);st.style.display='none';
  let found=null,lbl='';
  for(const p of preds){const l=p.className.toLowerCase();for(const m of MAP){if(m.kw.some(k=>l.includes(k))){found=m.type;lbl=p.className;break;}}if(found)break;}
  if(found){det.style.display='block';det.innerHTML=`🤖 AI 인식: "<b>${lbl}</b>" → <b>${DB[found].name}</b>`;pickType(found,false);}
  else{det.style.display='block';det.innerHTML=`🤖 술 종류를 확실히 구분하지 못했어요. (인식: ${preds[0].className}) 직접 선택해주세요.`;}
 }catch(e){st.style.display='none';det.style.display='block';det.innerHTML='⚠️ 분석 오류. 직접 선택하세요.';}
}

function pickType(k,scroll){
 curType=k;
 document.querySelectorAll('#typeRow .chip').forEach(c=>c.classList.toggle('on',c.textContent.includes(DB[k].name)));
 const br=document.getElementById('brandRow');br.innerHTML='';
 Object.keys(DB[k].brands).forEach(b=>{const c=document.createElement('div');c.className='chip';c.textContent=b;c.onclick=()=>renderBrand(k,b,c);br.appendChild(c);});
 document.getElementById('brandSel').style.display='block';
 document.getElementById('result').style.display='none';
 if(scroll)document.getElementById('brandSel').scrollIntoView({behavior:'smooth'});
}

function renderBrand(k,b,chip){
 if(chip){
   document.querySelectorAll('#brandRow .chip').forEach(c=>c.classList.remove('on'));
   chip.classList.add('on');
 }
 curBrand = b;
 const d=DB[k],br=d.brands[b],res=document.getElementById('result');
 let h=`<div class="rhead"><h2>${d.emoji} ${b}</h2><div class="desc">${d.name} · ${br.d}</div></div>`;
 
 // 1. AI 기본 안주 목록 렌더링
 ["food","snack","fruit","light"].forEach(c=>{
  if(!br.cats[c]||!br.cats[c].length)return;
  h+=`<div class="cat"><div class="ct">${CAT[c].e} ${CAT[c].t}</div><div class="menu">`;
  br.cats[c].forEach(it=>{h+=`<div class="item"><div class="emo">${it.emo}</div><div><div class="nm">${it.nm}</div><div class="rs">${it.rs}</div><div class="why">${it.why}</div></div></div>`;});
  h+=`</div></div>`;
 });

 // 2. 사용자가 추가한 안주 목록 렌더링 (파이어베이스 연동)
 if(br.userCats && br.userCats.length > 0) {
  h+=`<div class="cat user-cat"><div class="ct">👤 유저 추천 안주</div><div class="menu">`;
  br.userCats.forEach(it=>{
    const catBadge = `<span class="u-badge">${CAT[it.cat].e} ${CAT[it.cat].t}</span>`;
    h+=`<div class="item">
          <div class="emo">${it.emo}</div>
          <div><div class="nm">${it.nm} ${catBadge}</div><div class="rs">${it.rs}</div><div class="why">${it.why}</div></div>
          <div class="action-btns">
            <button onclick="editItem('${it.id}')">✏️</button>
            <button onclick="deleteItem('${it.id}')">🗑️</button>
          </div>
        </div>`;
  });
  h+=`</div></div>`;
 }
 
 // 3. 사용자 안주 추가 버튼
 h += `<div class="add-btn-wrap"><button class="add-btn" onclick="openModal()">+ 나만의 안주 추천 추가하기</button></div>`;
 
 res.innerHTML=h;res.style.display='block';
 if(chip) res.scrollIntoView({behavior:'smooth'}); 
}

/* --- 🌟 모달 제어 (추가/수정 모드 지원) --- */
function openModal(item = null) {
  document.getElementById('addModal').style.display = 'flex';
  if(item) {
    document.getElementById('modalTitle').textContent = "✏️ 안주 추천 수정하기";
    document.getElementById('m-cat').value = item.cat;
    document.getElementById('m-emo').value = item.emo;
    document.getElementById('m-nm').value = item.nm;
    document.getElementById('m-rs').value = item.rs;
    document.getElementById('m-why').value = item.why;
    editingId = item.id;
  } else {
    document.getElementById('modalTitle').textContent = "💡 나만의 안주 추천하기";
    document.getElementById('m-emo').value = '';
    document.getElementById('m-nm').value = '';
    document.getElementById('m-why').value = '';
    document.getElementById('m-pwd').value = '';
    editingId = null;
  }
}

function closeModal() {
  document.getElementById('addModal').style.display = 'none';
}

/* --- 🌟 파이어베이스 데이터 저장 함수 --- */
function submitPairing() {
  if(!database) { alert('파이어베이스가 연결되지 않았습니다. API 키를 확인해주세요.'); return; }
  
  const nm = document.getElementById('m-nm').value.trim();
  const pwd = document.getElementById('m-pwd').value.trim();

  if(!nm || !pwd) {
    alert('안주 이름과 4자리 비밀번호를 반드시 입력해주세요!');
    return;
  }

  const brandData = DB[curType].brands[curBrand];
  let userCats = brandData.userCats || [];

  if (editingId) {
    // 수정 모드
    const idx = userCats.findIndex(i => i.id === editingId);
    if(idx > -1) {
      if(userCats[idx].pwd !== pwd) { alert('비밀번호가 틀렸습니다!'); return; }
      userCats[idx] = {
        ...userCats[idx],
        cat: document.getElementById('m-cat').value,
        emo: document.getElementById('m-emo').value || '✨',
        nm: nm, rs: document.getElementById('m-rs').value,
        why: document.getElementById('m-why').value
      };
    }
  } else {
    // 신규 추가 모드
    userCats.push({
      id: Date.now().toString(), // 고유 ID로 시간값 사용
      cat: document.getElementById('m-cat').value,
      emo: document.getElementById('m-emo').value || '✨',
      nm: nm, rs: document.getElementById('m-rs').value,
      why: document.getElementById('m-why').value,
      pwd: pwd
    });
  }

  // 파이어베이스에 업데이트
  database.ref(`userCats/${curType}/${curBrand}`).set(userCats);
  closeModal();
}

/* --- 🌟 파이어베이스 수정/삭제 권한 확인 함수 --- */
function editItem(id) {
  const item = DB[curType].brands[curBrand].userCats.find(i => i.id === id);
  if(!item) return;
  const inputPwd = prompt('수정하려면 등록할 때 입력한 비밀번호 4자리를 적어주세요.');
  if (inputPwd === item.pwd) openModal(item);
  else if (inputPwd !== null) alert('비밀번호가 일치하지 않습니다.');
}

function deleteItem(id) {
  const item = DB[curType].brands[curBrand].userCats.find(i => i.id === id);
  if(!item) return;
  const inputPwd = prompt('삭제하려면 등록할 때 입력한 비밀번호 4자리를 적어주세요.');
  if (inputPwd === item.pwd) {
    if(confirm(`정말 '${item.nm}' 안주 추천을 삭제하시겠습니까?`)) {
      const newCats = DB[curType].brands[curBrand].userCats.filter(i => i.id !== id);
      database.ref(`userCats/${curType}/${curBrand}`).set(newCats);
    }
  } else if (inputPwd !== null) {
    alert('비밀번호가 일치하지 않습니다.');
  }
}
/* --- 🌟 PWA 서비스 워커 등록 (앱 설치용) --- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('서비스 워커 등록 성공!', reg.scope))
      .catch(err => console.log('서비스 워커 등록 실패:', err));
  });
}
/* --- 🌟 커스텀 앱 설치 팝업 (A2HS) --- */
let deferredPrompt;
const installPopup = document.getElementById('installPopup');
const installBtn = document.getElementById('installBtn');
const closeInstallBtn = document.getElementById('closeInstallBtn');

// 브라우저가 '앱 설치 가능' 상태를 감지했을 때 실행
window.addEventListener('beforeinstallprompt', (e) => {
  // 기본 미니 인포바가 뜨는 것을 방지
  e.preventDefault();
  // 이벤트를 보관해둠 (나중에 설치 버튼 누를 때 사용)
  deferredPrompt = e;
  
  // 접속하고 1.5초 뒤에 팝업이 스르륵 올라오게 설정
  setTimeout(() => {
    installPopup.classList.add('show');
  }, 1500);
});

// '설치하기' 버튼을 눌렀을 때
installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    installPopup.classList.remove('show'); // 우리 팝업 숨기기
    deferredPrompt.prompt(); // 진짜 시스템 설치 창 띄우기
    
    // 유저가 설치를 눌렀는지 취소했는지 확인
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`유저의 설치 선택: ${outcome}`);
    deferredPrompt = null;
  }
});

// 'X' 버튼을 눌렀을 때
closeInstallBtn.addEventListener('click', () => {
  installPopup.classList.remove('show');
});

// 설치가 성공적으로 끝났을 때
window.addEventListener('appinstalled', () => {
  installPopup.classList.remove('show');
  console.log('앱 설치가 완료되었습니다!');
});
</script>
